name: Release

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "!main"
  schedule:
    # At 04:00 on Monday (UTC+0)
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
      - run: npm ci
      - run: |
          npx @vscode/vsce package
      - name: Get Package Version
        id: get_version
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          echo "VERSION_OUTPUT=$VERSION" >> $GITHUB_OUTPUT
      - name: Push Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ steps.get_version.outputs.VERSION_OUTPUT }}
          files: |
            vscode-rust-pack-*.vsix
          body_path: ${{ github.workspace }}/CHANGELOG.md
          draft: false
          prerelease: false
          tag_name: v${{ steps.get_version.outputs.VERSION_OUTPUT }}
