name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: Install Dependencies
        run: npm ci
      - name: Build Extension
        run: |
          npm run pre-build
          npm run build:local
      - name: Get Package Version
        id: get_version
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          echo "VERSION_OUTPUT=$VERSION" >> $GITHUB_OUTPUT
      - name: Push Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ steps.get_version.outputs.VERSION_OUTPUT }}
          files: |
            vscode-rust-pack.vsix
          body_path: ${{ github.workspace }}/CHANGELOG.md
          draft: false
          prerelease: false
          tag_name: v${{ steps.get_version.outputs.VERSION_OUTPUT }}
